name: Publish to npm

# Publie sur npm via Trusted Publishing (OIDC) : aucun token ni OTP requis.
# Declenche a la publication d'une Release GitHub, ou manuellement.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # requis pour l'authentification OIDC vers npm

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted Publishing exige npm >= 11.5.1
      - run: npm install -g npm@latest

      - run: npm publish
